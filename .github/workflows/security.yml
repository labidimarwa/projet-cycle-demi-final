name: Security Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Every Monday at 06:00 UTC — proactive CVE scan
    - cron: '0 6 * * 1'

jobs:

  # =========================================================
  # 1. SECURITY INTEGRATION TESTS
  # =========================================================
  security-tests:
    name: Security Tests (XSS / SQLi / RBAC / FileUpload / Headers)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Run SecurityIntegrationTest (20 tests)
        run: |
          ./mvnw test \
            -Dspring.profiles.active=test \
            -Dtest=SecurityIntegrationTest \
            -DfailIfNoTests=true \
            --no-transfer-progress
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload security test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: target/surefire-reports/
          retention-days: 30

  # =========================================================
  # 2. OWASP DEPENDENCY-CHECK (CVE scan)
  # =========================================================
  dependency-check:
    name: OWASP Dependency-Check (CVE >= 7 fails build)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Run OWASP Dependency-Check
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            --no-transfer-progress \
            -DfailBuildOnCVSS=7 \
            -Dformats=HTML,JSON,XML
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload CVE report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report/
          retention-days: 90

  # =========================================================
  # 3. SECRET DETECTION — Gitleaks
  # =========================================================
  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================
  # 4. OWASP ZAP DAST (main push only)
  # =========================================================
  zap-scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Start backend for ZAP scan
        run: |
          ./mvnw spring-boot:run \
            -Dspring.profiles.active=test \
            -Dspring-boot.run.jvmArguments="-Dserver.port=8080" &
          timeout 90 bash -c \
            'until curl -sf http://localhost:8080/api/v1/jobs 2>/dev/null; do sleep 3; done'
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:8080/api/v1'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-I'
          artifact_name: zap-baseline-report
          allow_issue_writing: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-scan-report
          path: report_html.html
          retention-days: 30
