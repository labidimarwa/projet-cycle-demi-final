name: NexGenAI CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # =========================================================
  # BUILD + ALL TESTS + JACOCO
  # =========================================================
  build-and-test:
    name: Build, Tests & Coverage
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      # Sprint 1 — UserController (US-45, US-47)
      - name: Sprint 1 — UserController Tests (15 tests)
        run: |
          ./mvnw test \
            -Dtest=UserControllerTest \
            -Dspring.profiles.active=test \
            -DfailIfNoTests=true \
            --no-transfer-progress

      # Sprint 1 — CandidateController (US-14, US-15, US-20)
      - name: Sprint 1 — CandidateController Tests (13 tests)
        run: |
          ./mvnw test \
            -Dtest=CandidateControllerTest \
            -Dspring.profiles.active=test \
            -DfailIfNoTests=true \
            --no-transfer-progress

      # Security — XSS / SQLi / RBAC / FileUpload / Headers
      - name: Security Integration Tests (20 tests)
        run: |
          ./mvnw test \
            -Dtest=SecurityIntegrationTest \
            -Dspring.profiles.active=test \
            -DfailIfNoTests=true \
            --no-transfer-progress

      # Full build + JaCoCo coverage report
      - name: Full Build + JaCoCo Coverage
        run: ./mvnw clean verify -Dspring.profiles.active=test --no-transfer-progress
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 30

      # Test summary in GitHub Actions UI
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml

      # SonarCloud — main branch only
      - name: SonarCloud Scan
        if: github.ref == 'refs/heads/main'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=labidimarwa_projet-cycle-demi-final \
            -Dsonar.organization=labidimarwa \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.exclusions=**/dto/**,**/model/**,**/bootstrap/**,**/config/**
