# \u2500\u2500 Base de donnÕes H2 en mÕmoire (remplace MariaDB pendant les tests) \u2500\u2500
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# \u2500\u2500 JWT (mõme secret que prod) \u2500\u2500
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# \u2500\u2500 DÕsactiver l'envoi d'emails rÕels \u2500\u2500
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# \u2500\u2500 DÕsactiver Ollama \u2500\u2500
ollama.base-url=http://localhost:11434
ollama.model=mistral:7b
ollama.chat-model=mistral:7b

# \u2500\u2500 Upload \u2500\u2500
app.cv.upload-dir=uploads/cv
app.base-url=http://localhost:8080
app.question.image-dir=uploads/questions
app.code-execution.timeout-seconds=10
app.code-execution.memory-mb=128
app.code-execution.use-docker=false

# \u2500\u2500 Multipart \u2500\u2500
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# \u2500\u2500 Context path (mõme que prod) \u2500\u2500
server.servlet.context-path=/api/v1



spring.datasource.url=jdbc:h2:mem:nexgenai_test;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE